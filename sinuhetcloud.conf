name = "20ly-vajbcloding"
description = "Web port of 20,000 Light Years Into Space (GPL2, Jack Whitham)"
port = 8095

[scripts]
install = "pip3 install pygbag --break-system-packages --quiet && python3 -m pygbag --build --ume_block=0 main.py && bash web/patch_index.sh"
start = "python3 -m http.server ${PORT} --directory build/web"
update = "git pull && pip3 install pygbag --break-system-packages --quiet && python3 -m pygbag --build --ume_block=0 main.py && bash web/patch_index.sh"
uninstall = ""
